name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps --force

      - name: Build
        env:
          DEPLOY_PLATFORM: cloudflare
          PUBLIC_SITE_URL: https://blog.wenjiaqi.top
          PUBLIC_IS_PERSONAL_SITE: true
        run: npm run build

      - name: Remove Worker Config
        run: rm -f dist/server/wrangler.json dist/server/.prerender/wrangler.json

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=cool-blog