name = "cool-blog"
compatibility_date = "2024-04-03"

# Assets binding with custom name to avoid conflicts
[assets]
directory = "./dist/client"
binding = "STATIC_ASSETS"

# This configuration is for Cloudflare Workers deployment
# Build command: DEPLOY_PLATFORM=cloudflare npm run build
# Deploy command: wrangler deploy
#
# Note: The 'main' field is automatically set by @astrojs/cloudflare adapter
# during build. Do not manually set it here.
